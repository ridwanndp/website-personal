<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC Calculator</title>
</head>
<body>
    <h1>Air Conditioner Calculator</h1>
    <form id="calculator">
        <label for="area">Area (in square feet):</label>
        <input type="number" id="area" name="area" required>
        <br>
        <label for="windows">Number of Windows:</label>
        <input type="number" id="windows" name="windows" required>
        <br>
        <button type="submit">Calculate</button>
    </form>
    <h2 id="result"></h2>
    <script>
        document.getElementById('calculator').addEventListener('submit', function(event) {
            event.preventDefault();
            const area = parseFloat(document.getElementById('area').value);
            const windows = parseInt(document.getElementById('windows').value);
            const btu = (area * 20) + (windows * 100);
            document.getElementById('result').textContent = `Recommended BTU: ${btu}`;
        });
    </script>
</body>
</html>
